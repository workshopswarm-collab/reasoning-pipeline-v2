    {"id": "AUTO-003", "stage": "v2_live_cutover", "owner": "Session 1", "status": "ready_for_integration", "dependencies": ["AUTO-002", "CASE-002", "QDT-001", "CLS-001", "SCAE-012", "PERSIST-001"], "acceptance_evidence": "2026-06-25 Session 01 AUTO-003 implemented the Orchestrator-owned one-case dispatch state machine in orchestrator/scripts/predquant/ads_pipeline_runner.py (implementation commit ecb7fe8c5ea2a80c387f7d1b1c192fe243a2d65e); preserves AUTO-001 disabled/non-executing default unless explicit execution and forecast-persistence policy flags are set; checks durable control state, refuses duplicate in-flight leases, acquires one AUTO-002 eligible lease, records stage status/execution events for ADS_PIPELINE_STAGE_ORDER, invokes supplied handlers for integrated downstream contracts, requires exactly one PERSIST-001 forecast decision record from the decision stage, releases the lease on success, and quarantines with structured stage/error logging on handler or persistence-contract failure; does not author SCAE probability, decision authority, market_predictions, scoring, calibration, AUTO-004 retry/stop/drain, AUTO-005 multi-case looping, or MIG-013 persistence."},
    {"id": "AUTO-004", "stage": "v2_live_cutover", "owner": "Session 1", "status": "ready_for_integration", "dependencies": ["AUTO-003", "FND-006"], "acceptance_evidence": "2026-06-25 Session 01 AUTO-004 implemented retry/backoff, soft-fail quarantine, stop-before-next, stop-after-current, safe-drain acknowledgement, and stuck-lease recovery in orchestrator/scripts/predquant/ads_pipeline_runner.py and orchestrator/scripts/predquant/ads_pipeline_control.py (implementation commit fb3dc6a1bab22f6fe44cf8622162fa914ac70c39; report correction 942d3e0). The slice adds stop_ads_pipeline_loop.py for bounded control-state stop requests while deliberately leaving AUTO-005 continuous looping, MIG-013 durable stop-signal tables, scoring, calibration, and SCAE persistence out of scope."},
    {"id": "AUTO-005", "stage": "v2_live_cutover", "owner": "Session 1", "status": "ready_for_integration", "dependencies": ["AUTO-004", "FND-005", "PERSIST-002"], "acceptance_evidence": "2026-06-25 Session 01 AUTO-005 integrated a bounded continuous two-case loop fixture in orchestrator/scripts/predquant/ads_pipeline_runner.py and orchestrator/scripts/tests/test_ads_pipeline_runner.py (pushed commit f3e1c5f43c445ce72027fed59a38e67dbb32ac89). Evidence covers unique eligible-case leasing, MIG-013 loop iteration records, distinct forecast-decision refs per case, completed lease release, durable stop-after-current acknowledgement, no duplicate forecast persistence refs, and preservation of AUTO-003/AUTO-004 one-case behavior. See phase report orchestrator/plans/phase-reports/session-01-auto-005-continuous-loop-fixture.md."},
